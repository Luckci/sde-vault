name: Build & Release

# Trigger: push a tag like "v1.2.0"
on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build exe
        run: pyinstaller sde_vault.spec --noconfirm

      - name: Rename artifact
        run: mv dist/SDE-Vault.exe dist/SDE-Vault-Windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/SDE-Vault-Windows.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build binary
        run: pyinstaller sde_vault.spec --noconfirm

      - name: Zip for distribution
        run: zip -j dist/SDE-Vault-Mac.zip dist/SDE-Vault

      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/SDE-Vault-Mac.zip

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/SDE-Vault-Windows.exe
            artifacts/SDE-Vault-Mac.zip
          generate_release_notes: true
